# checkmake config for the kubernetes_config Makefile.
#
# This Makefile's recipes are legitimate multi-step shell pipelines (kustomize
# build | envsubst | kubectl apply, per-patch mktemp+trap+omnictl loops, etc.)
# rather than build steps that could be moved into a separate script. Relax
# the default rules accordingly:
#
#   - maxbodylength: default 5 lines is too aggressive for recipes that need
#     cleanup traps, preflight checks, and secret handling. 60 is a sane
#     upper bound that still flags genuinely unwieldy recipes.
#   - minphony: this is not a C build system; `all`, `clean`, `test` aren't
#     meaningful targets here. Empty `required` disables the check.
#
# Run: `checkmake Makefile`

[maxbodylength]
maxBodyLength = 60

[minphony]
required =
