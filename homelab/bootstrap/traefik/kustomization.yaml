apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The traefik namespace itself is defined (with PSA labels) in
# homelab/bootstrap/namespaces.yaml. Kustomize patches only target
# resources within the same kustomization's resource tree, so the
# namespace elevation lives there, not here.

resources:
  - traefik.yaml
