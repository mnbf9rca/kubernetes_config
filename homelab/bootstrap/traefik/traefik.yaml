---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik
rules:
  - apiGroups: [""]
    resources: [services, endpoints, secrets, nodes]
    verbs: [get, list, watch]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses, ingressclasses]
    verbs: [get, list, watch]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses/status]
    verbs: [update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: traefik
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: traefik.io/ingress-controller
---
# Traefik dynamic file config: sets the wildcard cert as the default
# certificate so workload Ingresses don't need to reference the secret
# individually. Traefik matches host SNI against the cert's DNS names
# (*.cynexia.net + cynexia.net) at request time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-dynamic
  namespace: traefik
data:
  tls.yaml: |
    tls:
      stores:
        default:
          defaultCertificate:
            certFile: /certs/tls.crt
            keyFile: /certs/tls.key
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: traefik
  namespace: traefik
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 6h"
spec:
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      containers:
        - name: traefik
          image: traefik:v3.3
          imagePullPolicy: Always
          args:
            - --global.checkNewVersion=false
            - --global.sendAnonymousUsage=false
            - --log.level=INFO
            - --accesslog=true
            - --ping=true
            - --providers.kubernetesingress=true
            - --providers.kubernetesingress.ingressclass=traefik
            - --providers.file.filename=/dynamic/tls.yaml
            - --providers.file.watch=true
            - --entrypoints.web.address=:80
            - --entrypoints.web.http.redirections.entrypoint.to=websecure
            - --entrypoints.web.http.redirections.entrypoint.scheme=https
            - --entrypoints.websecure.address=:443
            - --entrypoints.websecure.http.tls=true
          ports:
            - name: web
              containerPort: 80
              hostPort: 80
            - name: websecure
              containerPort: 443
              hostPort: 443
          # Exec probes avoid depending on which interface the pod IP resolves to.
          # hostNetwork=true means the pod inherits all host interfaces; kubelet
          # picks one as the "pod IP" (here it resolves to the 10.10.10.10 storage
          # NIC), and http probes against that IP confuse Traefik since the ping
          # endpoint is bound to the default Traefik internal entrypoint, not the
          # storage NIC. `traefik healthcheck` queries the local /ping on loopback
          # and works regardless.
          readinessProbe:
            exec:
              command: [traefik, healthcheck, --ping]
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            exec:
              command: [traefik, healthcheck, --ping]
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: wildcard-cert
              mountPath: /certs
              readOnly: true
            - name: dynamic
              mountPath: /dynamic
              readOnly: true
      volumes:
        - name: wildcard-cert
          secret:
            secretName: wildcard-cynexia-net-tls
        - name: dynamic
          configMap:
            name: traefik-dynamic
