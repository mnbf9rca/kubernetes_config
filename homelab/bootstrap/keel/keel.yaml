---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keel
  namespace: keel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keel
rules:
  - apiGroups: [""]
    resources: [namespaces, secrets]
    verbs: [get, watch, list]
  - apiGroups: ["", extensions, apps, batch]
    resources: [pods, replicasets, replicationcontrollers, statefulsets, deployments, daemonsets, jobs, cronjobs]
    verbs: [get, delete, watch, list, update]
  - apiGroups: [""]
    resources: [configmaps, pods/portforward]
    verbs: [get, create, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: keel
subjects:
  - kind: ServiceAccount
    name: keel
    namespace: keel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keel
  namespace: keel
  labels: { app: keel }
  # keel watches its own Deployment so it self-updates too. Same annotations
  # as every other Deployment in the cluster.
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 6h"
spec:
  replicas: 1
  selector:
    matchLabels: { app: keel }
  template:
    metadata:
      labels: { app: keel }
    spec:
      serviceAccountName: keel
      containers:
        - name: keel
          image: ghcr.io/keel-hq/keel:latest
          imagePullPolicy: Always
          command: [/bin/keel]
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POLL
              value: "true"
            - name: NOTIFICATION_LEVEL
              value: info
            - name: INSECURE_REGISTRY
              value: "false"
          ports:
            - containerPort: 9300
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
