apiVersion: v1
kind: Namespace
metadata:
  name: downloads
---
apiVersion: v1
kind: Namespace
metadata:
  name: keel
---
apiVersion: v1
kind: Namespace
metadata:
  name: traefik
  labels:
    # Traefik uses hostNetwork + hostPort, which violate PSA baseline
    # (the cluster-wide enforce level). Elevate this namespace to privileged
    # so the DaemonSet pod is allowed to schedule.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: backup
  labels:
    # The restic-backup CronJob mounts /var/mnt/local-path-provisioner via
    # hostPath so it can back up every local-path PV on the node. hostPath
    # volumes violate PSA baseline (cluster enforce level), so this namespace
    # must run at PSA privileged.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
# NOTE: cert-manager and local-path-storage namespaces are created by their
# respective upstream manifests, so they're omitted here (kustomize rejects
# duplicate resources). keel's upstream manifest may also create its own
# namespace — verify before adding keel to this file in Task 2.7.
