apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# cert-manager v1.20.2. The upstream manifest includes its own `cert-manager`
# Namespace definition, so homelab/bootstrap/namespaces.yaml intentionally
# omits it — kustomize would reject a duplicate resource.

resources:
  - https://github.com/cert-manager/cert-manager/releases/download/v1.20.2/cert-manager.yaml
  - clusterissuer.yaml
  - wildcard-certificate.yaml
