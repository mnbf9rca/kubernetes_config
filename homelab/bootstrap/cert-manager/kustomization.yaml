apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# cert-manager v1.20.2. The upstream manifest includes its own `cert-manager`
# Namespace definition; kustomize treats it as an overlay on the namespace
# we already created in homelab/bootstrap/namespaces.yaml.

resources:
  - https://github.com/cert-manager/cert-manager/releases/download/v1.20.2/cert-manager.yaml
