# Let's Encrypt production ClusterIssuer using Route53 DNS-01.
# DNS-01 is required because homelab services are not publicly reachable,
# so cert-manager can't use HTTP-01. The ACME account email is substituted
# from the ACME_EMAIL env var (set via .envrc from 1Password).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${ACME_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-dns01-account
    solvers:
      - selector:
          dnsZones:
            - cynexia.net
        dns01:
          route53:
            region: eu-west-1
            accessKeyIDSecretRef:
              name: route53-credentials
              key: access-key-id
            secretAccessKeySecretRef:
              name: route53-credentials
              key: secret-access-key
