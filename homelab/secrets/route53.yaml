# AWS credentials for cert-manager's Route53 DNS-01 solver.
# Values substituted from env vars at apply time (see .envrc).
# The secret MUST live in the cert-manager namespace — the ClusterIssuer's
# route53 solver looks for it there by default.
apiVersion: v1
kind: Secret
metadata:
  name: route53-credentials
  namespace: cert-manager
type: Opaque
stringData:
  access-key-id: ${ROUTE53_ACCESS_KEY_ID}
  secret-access-key: ${ROUTE53_SECRET_ACCESS_KEY}
