---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-config
  namespace: downloads
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 20Gi } }
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-media-nfs-pv
spec:
  capacity: { storage: 10Ti }
  accessModes: [ReadWriteMany]
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: sonarr-media-nfs
    volumeAttributes:
      server: "10.10.10.1"
      share: "/tank/video"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-media
  namespace: downloads
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  resources: { requests: { storage: 10Ti } }
  volumeName: sonarr-media-nfs-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: downloads
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 6h"
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: sonarr } }
  template:
    metadata:
      labels: { app: sonarr }
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers: ["8.8.8.8", "8.8.4.4"]
      containers:
        - name: sonarr
          image: linuxserver/sonarr:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1999"
            - name: PGID
              value: "1999"
            - name: TZ
              value: Europe/London
          ports:
            - containerPort: 8989
              name: http
          startupProbe:
            httpGet: { path: /, port: http }
            failureThreshold: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            failureThreshold: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
        - name: sqlite-snapshot
          image: alpine:3.20
          securityContext:
            runAsUser: 1999
            runAsGroup: 1999
          command: ["sh", "-c"]
          args:
            - |
              apk add --no-cache sqlite
              while true; do
                if [ -f /config/sonarr.db ]; then
                  sqlite3 /config/sonarr.db ".backup /config/sonarr.db.restic" 2>&1 || true
                fi
                sleep 43200
              done
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: sonarr-config }
        - name: media
          persistentVolumeClaim: { claimName: sonarr-media }
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: downloads
spec:
  selector: { app: sonarr }
  ports:
    - port: 8989
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr
  namespace: downloads
spec:
  ingressClassName: traefik
  rules:
    - host: sonarr.cynexia.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sonarr
                port:
                  number: 8989
