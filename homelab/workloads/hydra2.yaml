---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hydra2-config
  namespace: downloads
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 30Gi } }
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydra2
  namespace: downloads
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 6h"
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: hydra2 } }
  template:
    metadata:
      labels: { app: hydra2 }
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers: ["8.8.8.8", "8.8.4.4"]
      containers:
        - name: hydra2
          image: linuxserver/nzbhydra2:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1999"
            - name: PGID
              value: "1999"
            - name: TZ
              value: Europe/London
          ports:
            - containerPort: 5076
              name: http
          startupProbe:
            httpGet: { path: /, port: http }
            failureThreshold: 15
            periodSeconds: 30
          livenessProbe:
            httpGet: { path: /, port: http }
            failureThreshold: 2
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: hydra2-config }
---
apiVersion: v1
kind: Service
metadata:
  name: hydra2
  namespace: downloads
spec:
  selector: { app: hydra2 }
  ports:
    - port: 5076
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hydra2
  namespace: downloads
spec:
  ingressClassName: traefik
  rules:
    - host: hydra.cynexia.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hydra2
                port:
                  number: 5076
