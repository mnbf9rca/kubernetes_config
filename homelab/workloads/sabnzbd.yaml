---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-config
  namespace: downloads
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 20Gi } }
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sabnzbd-media-nfs-pv
spec:
  capacity: { storage: 10Ti }
  accessModes: [ReadWriteMany]
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: sabnzbd-media-nfs
    volumeAttributes:
      server: "10.10.10.1"
      share: "/tank/video"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-media
  namespace: downloads
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  resources: { requests: { storage: 10Ti } }
  volumeName: sabnzbd-media-nfs-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: downloads
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 6h"
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: sabnzbd } }
  template:
    metadata:
      labels: { app: sabnzbd }
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers: ["8.8.8.8", "8.8.4.4"]
      containers:
        - name: sabnzbd
          image: linuxserver/sabnzbd:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1999"
            - name: PGID
              value: "1999"
            - name: TZ
              value: Europe/London
          ports:
            - containerPort: 8080
              name: http
          startupProbe:
            httpGet: { path: /, port: http }
            failureThreshold: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            failureThreshold: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: sabnzbd-config }
        - name: media
          persistentVolumeClaim: { claimName: sabnzbd-media }
---
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
  namespace: downloads
spec:
  selector: { app: sabnzbd }
  ports:
    - port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sabnzbd
  namespace: downloads
spec:
  ingressClassName: traefik
  rules:
    - host: sab.cynexia.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sabnzbd
                port:
                  number: 8080
