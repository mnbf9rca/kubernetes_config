---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jottacloud-backup-sa
  namespace: jottacloud-backup
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jottacloud-backup-config
  namespace: jottacloud-backup
data:
  TZ: "UTC"
  RCLONE_LOG_LEVEL: "INFO"
  RCLONE_CONFIG_FILE: "/config/rclone.conf"
  JOTTA_REMOTE: "jotta"
  LOCAL_PATH: "/data/jotta"
  KOPIA_CONFIG_FILE: "/config/kopia.config"
  KOPIA_CACHE_DIR: "/config/cache"
  KOPIA_LOG_DIR: "/data/logs/kopia"
  KOPIA_USERNAME: "backup"
  KOPIA_HOSTNAME: "jotta-backup-client"
  SOURCE_PATH: "/data/jotta"
  S3_ENDPOINT: "s3.eu-central-003.backblazeb2.com"
  S3_BUCKET: "cloud-files-backup"
  S3_REGION: "eu-central-003"
  HEALTHCHECK_URL: "https://hc-ping.com"
  HEALTHCHECK_UUID: "${HEALTHCHECK_UUID}"
  BACKUP_TIMEOUT: "6h"
  MAX_PARALLEL_UPLOADS: "4"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jottacloud-backup-data-pv
spec:
  capacity: { storage: 2Ti }
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: jottacloud-backup-data-nfs
    volumeAttributes:
      server: "10.10.10.1"
      share: "/tank/largeappdata/jottacloud"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jottacloud-backup-data-pvc
  namespace: jottacloud-backup
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  resources: { requests: { storage: 2Ti } }
  volumeName: jottacloud-backup-data-pv
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jottacloud-backup-config-pvc
  namespace: jottacloud-backup
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 10Gi } }
  storageClassName: local-path
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jottacloud-backup-scheduled
  namespace: jottacloud-backup
  labels:
    app: jottacloud-backup
spec:
  schedule: "45 */6 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: 21600
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: jottacloud-backup
            job-type: scheduled
        spec:
          restartPolicy: Never
          serviceAccountName: jottacloud-backup-sa
          securityContext:
            runAsNonRoot: true
            runAsUser: 1999
            runAsGroup: 1999
            fsGroup: 1999
            fsGroupChangePolicy: "OnRootMismatch"
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: ghcr.io/mnbf9rca/jottacloud-backup:latest
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1999
                runAsGroup: 1999
                privileged: false
                capabilities:
                  drop: [ALL]
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: JOB_TYPE
                  value: "scheduled"
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: JOB_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['job-name']
              envFrom:
                - configMapRef:
                    name: jottacloud-backup-config
                - secretRef:
                    name: jottacloud-backup-secrets
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: config
                  mountPath: /config
                - name: tmp
                  mountPath: /tmp
                - name: rclone-config-secret
                  mountPath: /tmp/rclone-secret
                  readOnly: true
              resources:
                requests: { memory: "512Mi", cpu: "250m" }
                limits: { memory: "4Gi", cpu: "2000m" }
              livenessProbe:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - "ps aux | grep -v grep | grep -E '(rclone|kopia|backup.sh)' || test -f /tmp/backup-completed"
                initialDelaySeconds: 600
                periodSeconds: 300
                timeoutSeconds: 30
                failureThreshold: 5
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: jottacloud-backup-data-pvc
            - name: config
              persistentVolumeClaim:
                claimName: jottacloud-backup-config-pvc
            - name: tmp
              emptyDir:
                sizeLimit: 5Gi
            - name: rclone-config-secret
              secret:
                secretName: jottacloud-backup-secrets
                items:
                  - key: RCLONE_CONFIG
                    path: rclone.conf
