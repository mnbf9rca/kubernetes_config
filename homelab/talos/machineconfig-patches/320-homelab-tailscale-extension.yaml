# Configures the siderolabs/tailscale Talos system extension on the homelab node.
# The extension runs tailscaled on the host itself, so the node is reachable via
# its tailnet address for talosctl/kubectl when you're away from home.
#
# Advertises the home LAN as a subnet route, so any tailnet device can reach
# *.cynexia.net (which resolves to the node's LAN IP) over the mesh.
#
# ---
# NO TS_AUTHKEY HERE, BY DESIGN.
#
# Tailscale auth keys are one-shot: the extension consumes them on first boot
# and persists its machine key under /var/lib/tailscale. On every subsequent
# extension restart, containerboot runs `tailscale up` without --authkey, which
# is idempotent on an already-logged-in node. Storing a stale/consumed key in
# this file would be a disaster-recovery tripwire (on a state-volume wipe, the
# node would try to re-authenticate with a dead key and stay stuck).
#
# To bootstrap a brand-new install OR add a new node to the tailnet, use the
# dedicated Makefile targets:
#
#   # 1. Mint a one-shot reusable=no auth key in the Tailscale admin console
#   export TAILSCALE_AUTH_KEY=tskey-auth-...
#   # 2. Apply a temporary machine-scoped patch that injects TS_AUTHKEY
#   make bootstrap-tailscale                 # or: TALOS_MACHINE_ID=<id> make bootstrap-tailscale
#   # 3. Verify the node registered (Tailscale admin, `tailscale status`, etc.)
#   # 4. Remove the temporary patch from Omni
#   make clear-tailscale-bootstrap           # same TALOS_MACHINE_ID
#   unset TAILSCALE_AUTH_KEY
#
# The bootstrap template lives at:
#   homelab/talos/machineconfig-patches/bootstrap-tailscale-authkey.yaml.tpl
# The .tpl extension keeps `make apply-talos` from picking it up.
metadata:
  namespace: default
  type: ConfigPatches.omni.sidero.dev
  id: 320-homelab-tailscale-extension
  labels:
    omni.sidero.dev/cluster: homelab
  annotations:
    name: tailscale
spec:
  data: |-
    apiVersion: v1alpha1
    kind: ExtensionServiceConfig
    name: tailscale
    environment:
      - TS_HOSTNAME=talos-homelab
      - TS_ROUTES=10.100.0.0/24
