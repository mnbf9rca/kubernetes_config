# Temporary user volume for Phase 2–4 bring-up.
# Creates a writable bind mount inside the kubelet namespace so local-path-provisioner
# can create PV directories under /var/mnt/local-path-provisioner on the Talos ephemeral
# partition (i.e. the 64 GiB boot disk during Phase 2-4).
#
# Replaced in Phase 5.1 by `user-volume-ssd.yaml`, which declares the passed-through
# NVMe partition as a real user disk mounted at /var/mnt/ssd.
#
# Apply in Omni: Cluster homelab → Config → add as a machine config patch.
machine:
  kubelet:
    extraMounts:
      - destination: /var/mnt/local-path-provisioner
        type: bind
        source: /var/mnt/local-path-provisioner
        options:
          - bind
          - rshared
          - rw
