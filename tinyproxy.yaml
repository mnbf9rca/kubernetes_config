apiVersion: v1
kind: Namespace
metadata:
  name: proxy
  labels:
    name: proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tinyproxy-config
  namespace: proxy
data:
  tinyproxy.conf: |
    Port 8888
    Listen 0.0.0.0
    Timeout 600
    MaxClients 50
    Allow 0.0.0.0/0
    LogLevel Info
    ViaProxyName "tinyproxy"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyproxy-deployment
  namespace: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tinyproxy
  template:
    metadata:
      labels:
        app: tinyproxy
    spec:
      dnsConfig:
        nameservers:
        - 8.8.8.8
        - 8.8.4.4
      dnsPolicy: None
      containers:
      - name: tinyproxy
        image: vimagick/tinyproxy:latest
        ports:
        - name: proxy-port
          containerPort: 8888
          protocol: TCP
        volumeMounts:
        - name: tinyproxy-config
          mountPath: /etc/tinyproxy/tinyproxy.conf
          subPath: tinyproxy.conf
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          tcpSocket:
            port: proxy-port
          initialDelaySeconds: 10
          periodSeconds: 30
      volumes:
      - name: tinyproxy-config
        configMap:
          name: tinyproxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: tinyproxy-service
  namespace: proxy
spec:
  selector:
    app: tinyproxy
  ports:
  - name: proxy-port
    protocol: TCP
    port: 8888
    targetPort: proxy-port
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tinyproxy-network-policy
  namespace: proxy
spec:
  podSelector:
    matchLabels:
      app: tinyproxy
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cloudflare-tunnel
    ports:
    - protocol: TCP
      port: 8888
  egress:
  - {}
