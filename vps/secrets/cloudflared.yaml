# This file is a documentation placeholder. The cloudflared-credentials
# Secret is created imperatively via `make create-cloudflared-secret`,
# because the credentials JSON is multi-line and doesn't survive the
# kustomize + envsubst pipeline cleanly.
#
# To (re)create the Secret:
#   make create-cloudflared-secret
#
# The Secret's key is `credentials.json` and the value is read from
# op://VPS/cloudflared/credentials-json.
#
# Referenced by vps/bootstrap/cloudflared/cloudflared.yaml via a volume
# mount at /etc/cloudflared/creds/credentials.json.
