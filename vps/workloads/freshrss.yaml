apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: freshrss-data
  namespace: vps
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: freshrss-extensions
  namespace: vps
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  name: freshrss
  namespace: vps
spec:
  selector:
    app: freshrss
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: vps
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 6h"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
    spec:
      containers:
        - name: freshrss
          image: freshrss/freshrss:latest
          env:
            - { name: TZ, value: Europe/London }
            - { name: CRON_MIN, value: "*/15" }
          ports:
            - containerPort: 80
          volumeMounts:
            - { name: data, mountPath: /var/www/FreshRSS/data }
            - { name: extensions, mountPath: /var/www/FreshRSS/extensions }
        - name: sqlite-snapshot
          image: alpine:3.20
          command: ["sh", "-c"]
          args:
            - |
              apk add --no-cache sqlite >/dev/null
              while true; do
                for db in /var/www/FreshRSS/data/users/*/db.sqlite; do
                  [ -f "$db" ] && sqlite3 "$db" ".backup ${db}.restic" || true
                done
                sleep 43200
              done
          volumeMounts:
            - { name: data, mountPath: /var/www/FreshRSS/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: freshrss-data }
        - name: extensions
          persistentVolumeClaim: { claimName: freshrss-extensions }
