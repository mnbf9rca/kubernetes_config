apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No top-level namespace override. Each manifest declares its own namespace.
#
# Child directories are re-enabled task-by-task as the rebuild progresses:
#   - secrets/    re-enabled by Task 3.1 (first secret)
#   - backup/     re-enabled by Task 3.2 (restic init Job)
#   - workloads/  re-enabled by Task 4.1 (first workload)

resources:
  - bootstrap
  - secrets
  - backup
  - workloads
