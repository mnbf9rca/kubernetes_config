apiVersion: v1
kind: Namespace
metadata:
  name: vps
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: backup
  labels:
    # Privileged because the restic CronJob uses a hostPath mount to
    # read /var/mnt/data/local-path-provisioner. Same rationale as
    # homelab's backup namespace.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  # Declared here because vps/bootstrap/keel/keel.yaml is hand-written
  # (upstream keel moved to Helm-only and no longer ships flat manifests),
  # so nothing else creates the `keel` namespace for us.
  name: keel
