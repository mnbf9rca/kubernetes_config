apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/rancher/local-path-provisioner/deploy?ref=v0.0.31

patches:
  # The provisioner spawns helper-pods with hostPath volumes to create/remove
  # PVC directories on the node. hostPath is forbidden under the cluster-wide
  # PSA `baseline` default, so elevate the namespace to `privileged`.
  - target:
      kind: Namespace
      name: local-path-storage
    patch: |-
      - op: add
        path: /metadata/labels
        value:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
  - target:
      kind: ConfigMap
      name: local-path-config
      namespace: local-path-storage
    patch: |-
      - op: replace
        path: /data/config.json
        value: |
          {
            "nodePathMap": [
              {
                "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
                "paths": ["/var/mnt/data/local-path-provisioner"]
              }
            ]
          }
  - target:
      kind: Deployment
      name: local-path-provisioner
      namespace: local-path-storage
    patch: |-
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
  # Mark the upstream StorageClass as default and switch to Retain reclaim
  # policy so accidental PVC deletion doesn't nuke the underlying data —
  # matches the homelab cluster's discipline.
  - target:
      kind: StorageClass
      name: local-path
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          storageclass.kubernetes.io/is-default-class: "true"
      - op: replace
        path: /reclaimPolicy
        value: Retain
